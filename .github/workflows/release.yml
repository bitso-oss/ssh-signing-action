name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse semver from tag
        id: semver
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::error::Tag $TAG does not match semver pattern vMAJOR.MINOR.PATCH"
            exit 1
          fi
          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"
          echo "major=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          echo "minor=${BASH_REMATCH[2]}" >> "$GITHUB_OUTPUT"
          echo "patch=${BASH_REMATCH[3]}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.semver.outputs.tag }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes

      - name: Update floating major tag
        run: |
          MAJOR="v${{ steps.semver.outputs.major }}"
          git tag -f "$MAJOR"
          git push -f origin "$MAJOR"
